kind = "web"
previewPath = "/"
title = "Jane Beauty Store"
version = "1.0.0"
id = "artifacts/jane-beauty-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18725

[services.development]
run = "pnpm --filter @workspace/jane-beauty-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jane-beauty-store", "run", "build" ]
publicDir = "artifacts/jane-beauty-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18725"
BASE_PATH = "/"
